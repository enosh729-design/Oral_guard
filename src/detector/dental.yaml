# OralGuard — YOLO Dataset Configuration
# Dataset: DENTEX Challenge 2023 (MICCAI)
# Task: Detection + classification of dental pathologies on panoramic X-rays
#
# IMPORTANT: Run src/detector/convert_dentex.py ONCE before training to
# convert COCO JSON annotations to YOLO .txt format and organise images.
#
# Actual extracted DENTEX structure:
#   training_data/training_data/quadrant-enumeration-disease/
#     xrays/                          ← 705 training panoramic images
#     train_quadrant_enumeration_disease.json  ← COCO annotations
#   validation_data/validation_data/quadrant_enumeration_disease/
#     xrays/                          ← 50 validation images (no public labels)
#
# After running convert_dentex.py the structure becomes:
#   images/train/  images/val/  images/test/
#   labels/train/  labels/val/  labels/test/

# Root path
path: C:/Users/enosh/oralguard/data/dentex

# Relative paths to splits (populated by convert_dentex.py)
train: images/train
val:   images/val
test:  images/test

# Number of classes
nc: 4

# Class names (FDI-aligned dental pathology labels)
names:
  0: caries
  1: deep_caries
  2: periapical_lesion
  3: impacted_tooth

# Dataset statistics (after conversion)
#   Train : 705 panoramic OPG images
#   Val   : ~25 images (half of validation_data)
#   Test  : ~25 images (other half of validation_data)

# Citation:
#   Hamamci et al. (2023). DENTEX: An Abnormal Tooth Detection with
#   Dental Enumeration and Diagnosis Benchmark. MICCAI 2023.
#   https://arxiv.org/abs/2305.11106
